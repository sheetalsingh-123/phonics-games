<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phonics Sound Game</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #eef7ff;
}

#game {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
}

.picture {
  width: 120px;
  height: 120px;
  border: 2px dashed #ccc;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}

.picture img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.circle {
  position: absolute;
  width: 110px;
  height: 110px;
  border: 4px solid blue;
  border-radius: 50%;
  top: 5px;
  left: 5px;
  display: none;
}

.circled .circle {
  display: block;
}

#pictures {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
}

button {
  padding: 10px 15px;
  margin: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="game">
  <h2>Circle the Pictures</h2>
  <p>Click the pictures that match this sound:</p>
  <h1 id="target-letter"></h1>

  <button onclick="playSound()">🔊 Play Sound</button>

  <div id="pictures"></div>

  <button onclick="checkAnswers()">Check</button>
  <button onclick="nextLevel()">Next</button>

  <h3 id="feedback"></h3>
</div>

<script>

{src:basePath+"cup.jpg", correct:false}

]},

{ sound:"y", audio:basePath+"y.mp3", pictures:[

{src:basePath+"zip.jpg", correct:false}
]},

{ sound:"z", audio:basePath+"z.mp3", pictures:[
{src:basePath+"zebra.jpg", correct:true},
{src:basePath+"zip.jpg", correct:true},
{src:basePath+"ant.jpg", correct:false},
{src:basePath+"balloons.jpg", correct:false}
]}
];

// GAME LOGIC
let currentLevel = 0;
let selected = new Set();
let audio;

function loadLevel() {
  const level = levels[currentLevel];
  document.getElementById("target-letter").textContent = level.sound.toUpperCase();

  audio = new Audio(level.audio);

  const container = document.getElementById("pictures");
  container.innerHTML = "";
  selected.clear();

  level.pictures.forEach(pic => {
    const div = document.createElement("div");
    div.className = "picture";
    div.dataset.correct = pic.correct;

    div.innerHTML = `
      <img src="${pic.src}">
      <div class="circle"></div>
    `;

    div.onclick = () => {
      div.classList.toggle("circled");
      if (selected.has(div)) selected.delete(div);
      else selected.add(div);
    };

    container.appendChild(div);
  });

  // 🔊 Auto play sound
  setTimeout(() => playSound(), 500);
}

function playSound() {
  if (audio) {
    audio.currentTime = 0;
    audio.play();
  }
}

function checkAnswers() {
  let correct = 0, wrong = 0;

  selected.forEach(el => {
    if (el.dataset.correct === "true") correct++;
    else wrong++;
  });

  const total = levels[currentLevel].pictures.filter(p=>p.correct).length;

  if (wrong > 0) {
    feedback.textContent = "❌ Some are incorrect";
  } else if (correct === total) {
    feedback.textContent = "✅ Perfect!";
  } else {
    feedback.textContent = "🟡 Try again!";
  }
}

function nextLevel() {
  currentLevel++;
  if (currentLevel >= levels.length) {
    feedback.textContent = "🎉 Game Complete!";
    return;
  }
  loadLevel();
}

loadLevel();
</script>

</body>
</html>
